- hosts: app
  become: yes
  vars:
    app_dir: /opt/app
    ghcr_registry: ghcr.io
    ghcr_image: "{{ lookup('env', 'GHCR_IMAGE') }}"
    ghcr_user: "{{ lookup('env', 'GHCR_USER') }}"
    ghcr_token: "{{ lookup('env', 'GHCR_TOKEN') }}"
    
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - docker.io
          - docker-compose
          - python3-docker
        state: present

    - name: Start Docker service
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Copy docker-compose.yml
      copy:
        src: infra/docker-compose.yml
        dest: "{{ app_dir }}/docker-compose.yml"
        owner: ubuntu
        group: ubuntu
        mode: '0644'

    - name: Copy nginx config
      copy:
        src: infra/nginx.conf
        dest: "{{ app_dir }}/nginx.conf"
        owner: ubuntu
        group: ubuntu
        mode: '0644'

    - name: Login to GitHub Container Registry
      docker_login:
        registry: "{{ ghcr_registry }}"
        username: "{{ ghcr_user }}"
        password: "{{ ghcr_token }}"
      when: ghcr_token != ""

    - name: Pull latest Docker images
      docker_compose:
        project_src: "{{ app_dir }}"
        pull: yes
      register: compose_pull

    - name: Stop and remove old containers
      docker_compose:
        project_src: "{{ app_dir }}"
        state: absent
      when: compose_pull.changed

    - name: Start application with Docker Compose
      docker_compose:
        project_src: "{{ app_dir }}"
        state: present
        restarted: yes
      register: compose_result

    - name: Wait for application to be healthy
      uri:
        url: http://localhost:8000/health
        status_code: 200
      register: health_check
      until: health_check.status == 200
      retries: 12
      delay: 5
      ignore_errors: yes

    - name: Show deployment status
      debug:
        msg: |
          Deployment completed!
          Docker Compose status: {{ compose_result }}
          Health check: {{ health_check.status | default('N/A') }}